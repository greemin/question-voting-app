services:
  backend:
    image: ghcr.io/greemin/question-voting-app/backend:${TAG:-latest}
    ports:
      - "8081:8081"
    environment:
      - DB_DRIVER=${DB_DRIVER:-sqlite}
      - SQLITE_FILE=${SQLITE_FILE:-/data/data.db}
      - MONGO_URI=${MONGO_URI:-}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PORT=${PORT}
      - ENV=${ENV}
    depends_on:
      mongo:
        condition: service_healthy
        required: false
    volumes:
      - sqlite-data:/data
    networks:
      - frontend-network
      - backend-network

  frontend:
    image: ghcr.io/greemin/question-voting-app/frontend:${TAG:-latest}
    ports:
      - "80:80"
    environment:
      - ENV=${ENV}
      - NODE_ENV=${ENV}
      - APP_NAME=${APP_NAME}
    depends_on:
      - backend
    networks:
      - frontend-network

  mongo:
    profiles:
      - mongo
    image: mongo:${MONGO_VERSION:-latest}
    command: ["--auth", "--quiet"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "${MONGO_SHELL_COMMAND:-mongosh} -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: ${MONGO_HEALTHCHECK_START_PERIOD:-0s}


volumes:
  sqlite-data:
  mongo-data:

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
