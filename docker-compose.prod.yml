services:
  backend:
    image: ghcr.io/greemin/question-voting-app/backend:${TAG:-latest}
    restart: unless-stopped
    environment:
      - MONGO_URI=${MONGO_URI}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PORT=8081
      - ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network

  frontend:
    image: ghcr.io/greemin/question-voting-app/frontend:${TAG:-latest}
    restart: unless-stopped
    environment:
      - ENV=production
      - NODE_ENV=production
      - APP_NAME=${APP_NAME}
    depends_on:
      - backend
    networks:
      - frontend-network

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    networks:
      - frontend-network

  mongo:
    image: mongo:${MONGO_VERSION:-latest}
    restart: unless-stopped
    command: ["--auth", "--quiet"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "${MONGO_SHELL_COMMAND:-mongosh} -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: ${MONGO_HEALTHCHECK_START_PERIOD:-0s}

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:8888:8080"
    networks:
      - frontend-network

volumes:
  mongo-data:
  caddy-data:
  caddy-config:

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
