name: Publish Docker Images

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push images to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/question-voting-app

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          build-args: |
            VITE_BUILD_SHA=${{ steps.tag.outputs.sha }}
