name: Publish Docker Images

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push images to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/question-voting-app

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::7}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ -z "$BRANCH" ]; then BRANCH="${{ github.ref_name }}"; fi

          {
            echo "backend<<EOF"
            echo "${{ env.IMAGE_PREFIX }}/backend:$SHA"
            if [ "$BRANCH" = "master" ]; then
              echo "${{ env.IMAGE_PREFIX }}/backend:latest"
            fi
            echo "EOF"

            echo "frontend<<EOF"
            echo "${{ env.IMAGE_PREFIX }}/frontend:$SHA"
            if [ "$BRANCH" = "master" ]; then
              echo "${{ env.IMAGE_PREFIX }}/frontend:latest"
            fi
            echo "EOF"

            echo "sha=$SHA"
          } >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.backend }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.frontend }}
          build-args: |
            VITE_BUILD_SHA=${{ steps.tags.outputs.sha }}
