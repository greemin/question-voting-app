name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"
      - "env.example"
      - "docker-compose.prod.yml"
      - "**/.dockerignore"
      - "k6/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"
      - "env.example"
      - "docker-compose.prod.yml"
      - "**/.dockerignore"
      - "k6/**"

jobs:
  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./services/frontend/package-lock.json

      - run: npm ci
      - run: npm test -- --run

  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./services/backend/go.mod
          cache-dependency-path: ./services/backend/go.sum

      - run: go test ./...

  backend-integration-sqlite:
    name: Backend Integration Tests (SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./services/backend/go.mod
          cache-dependency-path: ./services/backend/go.sum

      - run: go test -tags integration -v -run TestSQLiteStorageCRUD ./internal/storage/...

  backend-integration-mongo:
    name: Backend Integration Tests (MongoDB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./services/backend/go.mod
          cache-dependency-path: ./services/backend/go.sum

      - run: go test -tags integration -v -run TestMongoStorageCRUD ./internal/storage/...

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      PORT: 8081
      CORS_ORIGINS: http://localhost
      BASE_URL: http://localhost
      ENV: production
      BACKEND_API_URL: http://backend:8081
      APP_NAME: CI Question App
      ALLOWED_HOSTS: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./services/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./services/frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('services/frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: ./services/frontend
        run: npx playwright install chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright OS dependencies
        working-directory: ./services/frontend
        run: npx playwright install-deps chromium

      - name: Build and start stack
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend at http://localhost..."
          timeout 180 bash -c 'until curl -sf http://localhost > /dev/null; do sleep 3; done'
          echo "Frontend is up."

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml logs

      - name: Run Playwright tests
        working-directory: ./services/frontend
        env:
          CI: true
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: services/frontend/playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml down -v
