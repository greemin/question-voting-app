name: Backend Integration Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./services/backend/go.mod
          cache-dependency-path: ./services/backend/go.sum

      # Testcontainers pulls and manages the MongoDB Docker image itself —
      # no manual service setup needed.
      - name: Run integration tests
        run: go test -tags integration -v ./internal/storage/...
