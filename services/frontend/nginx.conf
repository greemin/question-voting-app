# 10 questions/min per IP — main flood vector
limit_req_zone $binary_remote_addr zone=questions:10m rate=10r/m;
# 10 session creations/min per IP
limit_req_zone $binary_remote_addr zone=sessions:10m rate=10r/m;
# 30 votes/min per IP
limit_req_zone $binary_remote_addr zone=votes:10m rate=30r/m;
# 60 req/min per IP — covers admin actions, WebSocket upgrades
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_status 429;

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Stricter limit for session creation
    location = /api/session {
        limit_req zone=sessions burst=5 nodelay;
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Stricter limit for question submissions
    location ~ ^/api/session/[^/]+/questions$ {
        limit_req zone=questions burst=5 nodelay;
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Rate limit for votes
    location ~ ^/api/session/[^/]+/questions/[^/]+/vote$ {
        limit_req zone=votes burst=10 nodelay;
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # General API — WebSocket, admin endpoints
    location /api {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
